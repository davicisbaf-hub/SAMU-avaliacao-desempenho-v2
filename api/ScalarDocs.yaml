openapi: 3.0.3
info:
  title: SAMU - API de Avaliação de Desempenho
  description: |
    API REST do sistema de avaliação de desempenho do SAMU (Serviço de Atendimento Móvel de Urgência).

    ## Autenticação
    A maioria dos endpoints requer um token JWT obtido via `POST /login`.
    Envie o token no header `Authorization: Bearer <token>`.

    O token expira em **8 horas**.
  version: 1.0.0

servers:
  - url: http://localhost:3001/api/
    description: Desenvolvimento local
  - url: https://avaliacao360.cisbaf.org.br/api/
    description: Produção

tags:
  - name: Auth
    description: Autenticação
  - name: Usuários
    description: Gestão de usuários
  - name: Avaliações
    description: Registro e consulta de avaliações
  - name: Frequência
    description: Configuração do intervalo mínimo entre avaliações, por nível de experiência do usuário avaliado
  - name: Critérios
    description: Critérios e tipos de avaliação
  - name: KPIs
    description: Indicadores e métricas de desempenho
  - name: Auxiliares
    description: Tabelas auxiliares (fichas, bases, escalas, etc.)

# ---------------------------------------------------------------------------
# SECURITY
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # -------------------------------------------------------------------------
  # SCHEMAS
  # -------------------------------------------------------------------------
  schemas:

    # --- Auth ---------------------------------------------------------------
    LoginRequest:
      type: object
      required: [cpf]
      properties:
        cpf:
          type: string
          description: CPF do usuário (sem máscara), usado como credencial de login.
          example: "12345678900"
        base:
          type: string
          nullable: true
          description: |
            Opcional. Necessário apenas quando o CPF informado está vinculado a mais de
            uma base simultaneamente - nesse caso, uma primeira chamada sem `base` retorna
            `LoginEscolherBase` para que o usuário escolha, e uma segunda chamada deve
            reenviar o `cpf` junto com a `base` escolhida.
          example: "Base Central"

    LoginResponse:
      description: |
        Retorno do login. Pode ser um login bem-sucedido (`LoginSucesso`) ou, quando o CPF
        pertence a mais de uma base e nenhuma `base` foi informada, um pedido para o
        frontend exibir um seletor de base (`LoginEscolherBase`).
      oneOf:
        - $ref: '#/components/schemas/LoginSucesso'
        - $ref: '#/components/schemas/LoginEscolherBase'

    LoginSucesso:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "João Silva"
        email:
          type: string
          example: joao.silva@samu.com.br
        funcao:
          type: string
          example: "Médico Regulador"
        perfil:
          type: string
          enum: [admin, gestor, avaliador, avaliado]
          example: "gestor"
        base:
          type: string
          example: "Base Central"
        ativo:
          type: boolean
          example: true
        criadoEm:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        par:
          type: array
          items:
            type: integer
          example: [2, 5]
          nullable: true

    LoginEscolherBase:
      type: object
      properties:
        escolherBase:
          type: boolean
          example: true
        usuarios:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              nome:
                type: string
                example: "João Silva"
              funcao:
                type: string
                example: "Médico Regulador"
              perfil:
                type: string
                enum: [admin, gestor, avaliador, avaliado]
                example: "gestor"
              base:
                type: string
                example: "Base Central"

    # --- Usuário ------------------------------------------------------------
    Usuario:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "João Silva"
        email:
          type: string
          format: email
          example: joao.silva@samu.com.br
        cpf:
          type: string
          description: CPF do usuário (sem máscara).
          example: "12345678900"
        funcao:
          type: string
          example: "Médico Regulador"
        perfil:
          type: string
          enum: [admin, gestor, avaliador, avaliado]
          example: "gestor"
        base:
          type: string
          example: "Base Central"
        ativo:
          type: boolean
          example: true
        criado_em:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        par:
          type: array
          items:
            type: integer
          nullable: true
          example: [2, 5]

    UsuarioResumo:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        email:
          type: string
        funcao:
          type: string
        perfil:
          type: string

    UsuarioRequest:
      type: object
      required: [nome, email, cpf, funcao, perfil, base]
      properties:
        nome:
          type: string
          example: "João Silva"
        email:
          type: string
          format: email
          example: joao.silva@samu.com.br
        cpf:
          type: string
          description: |
            CPF do usuário (sem máscara). Validado no backend (biblioteca `validar-cpf`);
            requisições com CPF inválido retornam `400`. É também a credencial usada no login.
          example: "12345678900"
        funcao:
          type: string
          example: "Médico Regulador"
        perfil:
          type: string
          enum: [admin, gestor, avaliador, avaliado]
          example: "avaliador"
        base:
          type: string
          example: "Base Central"
        par:
          type: array
          items:
            type: integer
          nullable: true
          example: [2, 5]

    # --- Avaliação ----------------------------------------------------------
    ResultadoCriterio:
      type: object
      description: Mapa de critério → nota e peso
      additionalProperties:
        type: object
        properties:
          nota:
            type: integer
            minimum: 0
            maximum: 10
            example: 8
          peso:
            type: integer
            example: 3
      example:
        criterio_01:
          nota: 8
          peso: 3
        criterio_02:
          nota: 7
          peso: 2

    AvaliacaoRequest:
      type: object
      required: [avaliadorId, avaliadoId, modalidade, tipoAvaliacao, resultado]
      properties:
        avaliadorId:
          type: integer
          example: 1
        avaliadoId:
          type: integer
          example: 3
        modalidade:
          type: string
          description: |
            Direção/modalidade da avaliação. Usada, junto com `tipoAvaliacao`, para checar a
            regra de frequência mínima entre avaliações (ver `/frequencia-avaliacoes`).
            Segue tipicamente os mesmos valores usados em `avaliacao` de Critérios.
          example: "autoavaliacao"
        tipoAvaliacao:
          type: string
          example: "Médico"
        resultado:
          $ref: '#/components/schemas/ResultadoCriterio'
        observacoesGerais:
          type: string
          nullable: true
          example: "Profissional comprometido e proativo."
        pontosMelhorar:
          type: string
          nullable: true
          example: "Melhorar comunicação com a equipe."
        planoAcao:
          type: string
          nullable: true
          example: "Participar de treinamento de liderança."

    Avaliacao:
      type: object
      properties:
        id:
          type: integer
          example: 42
        avaliador_nome:
          type: string
          example: "João Silva"
        avaliador_funcao:
          type: string
          example: "Médico Regulador"
        avaliado_nome:
          type: string
          example: "Maria Souza"
        avaliado_funcao:
          type: string
          example: "Técnica de Enfermagem"
        modalidade:
          type: string
          example: "autoavaliacao"
        tipo_avaliacao:
          type: string
          example: "Médico"
        resultado:
          $ref: '#/components/schemas/ResultadoCriterio'
        observacoes_gerais:
          type: string
          nullable: true
        pontos_melhorar:
          type: string
          nullable: true
        plano_acao:
          type: string
          nullable: true
        criado_em:
          type: string
          format: date-time
          example: "2024-06-01T14:00:00Z"

    AvaliacaoCriada:
      description: Retorno do POST /avaliacoes - a avaliação criada, acrescida do nível calculado para o avaliado.
      allOf:
        - $ref: '#/components/schemas/Avaliacao'
        - type: object
          properties:
            nivel:
              type: string
              description: |
                Nível de experiência do avaliado, calculado a partir de `dias_desde_criacao`
                do usuário e das faixas configuradas em `/frequencia-avaliacoes`.
              example: "iniciante"

    # --- Frequência de Avaliação ---------------------------------------------
    FrequenciaNivel:
      type: object
      description: |
        Configuração de intervalo mínimo entre avaliações para usuários em um nível de
        experiência. `dias_minimos`/`dias_maximos` definem a faixa (em dias desde a criação
        do usuário) que caracteriza o nível; `dias`/`semanas`/`meses`/`anos` somados definem
        o intervalo mínimo entre avaliações do mesmo avaliador ao mesmo avaliado, com a
        mesma `modalidade` e `tipoAvaliacao`. Quando todos esses quatro campos são zero,
        não há restrição de frequência para o nível.
      properties:
        id:
          type: integer
          example: 1
        nivel:
          type: string
          example: "iniciante"
        dias_minimos:
          type: integer
          description: Dias mínimos (desde a criação do usuário) para se enquadrar neste nível.
          example: 0
        dias_maximos:
          type: integer
          description: Dias máximos (desde a criação do usuário) para se enquadrar neste nível.
          example: 90
        dias:
          type: integer
          example: 0
        semanas:
          type: integer
          example: 0
        meses:
          type: integer
          example: 1
        anos:
          type: integer
          example: 0
        ativo:
          type: boolean
          example: true
        atualizado_em:
          type: string
          format: date-time
          example: "2024-06-01T14:00:00Z"

    FrequenciaNivelRequest:
      type: object
      required: [nivel, dias_minimos, dias_maximos, dias, semanas, meses, anos, ativo]
      properties:
        nivel:
          type: string
          example: "iniciante"
        dias_minimos:
          type: integer
          example: 0
        dias_maximos:
          type: integer
          example: 90
        dias:
          type: integer
          example: 0
        semanas:
          type: integer
          example: 0
        meses:
          type: integer
          example: 1
        anos:
          type: integer
          example: 0
        ativo:
          type: boolean
          example: true

    InfoUsuarioAvaliacao:
      type: object
      description: Resposta de `/avaliacoes/info` com o nível calculado do usuário e, opcionalmente, se ele já pode ser reavaliado.
      properties:
        usuarioId:
          type: string
          example: "3"
        nome:
          type: string
          example: "Maria Souza"
        nivel:
          type: string
          example: "iniciante"
        dias_desde_criacao:
          type: integer
          example: 42
        frequencia:
          $ref: '#/components/schemas/FrequenciaNivel'
        niveis_disponiveis:
          type: array
          items:
            type: object
            properties:
              nivel:
                type: string
                example: "iniciante"
              dias_minimos:
                type: integer
                example: 0
              dias_maximos:
                type: integer
                example: 90
        ultima_avaliacao:
          type: string
          format: date-time
          nullable: true
          description: Só presente quando `avaliadorId`, `modalidade` e `tipoAvaliacao` foram informados na query.
        proxima_liberacao:
          type: string
          format: date-time
          nullable: true
          description: Data/hora a partir da qual uma nova avaliação com os mesmos parâmetros é permitida.
        pode_avaliar:
          type: boolean
          nullable: true
        modalidade_verificada:
          type: string
          nullable: true
        tipo_avaliacao_verificado:
          type: string
          nullable: true
        avaliacoes_por_modalidade_tipo:
          type: array
          items:
            type: object
            properties:
              modalidade:
                type: string
                example: "autoavaliacao"
              tipo_avaliacao:
                type: string
                example: "Médico"
              total:
                type: integer
                example: 3
              ultima:
                type: string
                format: date-time

    # --- Critério -----------------------------------------------------------
    CriterioRequest:
      type: object
      required: [tipo, categoria, codigo, criterio, peso, avaliacao]
      properties:
        tipo:
          type: string
          example: "Médico"
        categoria:
          type: string
          example: "Competência Técnica"
        codigo:
          type: string
          example: "CT-01"
        criterio:
          type: string
          example: "Conhecimento em protocolos de urgência"
        peso:
          type: integer
          example: 3
        indicador:
          type: string
          nullable: true
          example: "Aplica corretamente os protocolos em 90% dos atendimentos"
        avaliacao:
          type: string
          enum: ["Lider > Liderado", "Liderado > Lider", "Par", "autoavaliacao"]
          example: "autoavaliacao"

    Criterio:
      allOf:
        - type: object
          properties:
            id:
              type: integer
              example: 10
            ativo:
              type: boolean
              example: true
        - $ref: '#/components/schemas/CriterioRequest'

    TipoAvaliacao:
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string
          example: "Médico"
        ativo:
          type: boolean

    # --- KPIs ---------------------------------------------------------------
    KpiCategoria:
      type: object
      properties:
        categoria:
          type: string
          example: "Competência Técnica"
        tipo_avaliacao:
          type: string
          example: "Médico"
        total_avaliacoes:
          type: integer
          example: 25
        profissionais_avaliados:
          type: integer
          example: 10
        media_ponderada:
          type: number
          format: float
          example: 7.85
        nota_maxima:
          type: integer
          example: 10
        nota_minima:
          type: integer
          example: 4
        soma_pesos:
          type: integer
          example: 75

    KpiProfissional:
      type: object
      properties:
        nome:
          type: string
          example: "Maria Souza"
        funcao:
          type: string
          example: "Técnica de Enfermagem"
        total_avaliacoes:
          type: integer
          example: 5
        tipo_avaliacao:
          type: string
          example: "Técnico de Enfermagem"
        media_geral:
          type: number
          format: float
          example: 8.2

    # --- Auxiliares ---------------------------------------------------------
    Ficha:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
          example: "Ficha Médico Regulador"
        ordem:
          type: integer
        ativo:
          type: boolean

    Frequencia:
      type: object
      properties:
        id:
          type: integer
        descricao:
          type: string
          example: "Mensal"
        ordem:
          type: integer
        ativo:
          type: boolean

    Fluxo:
      type: object
      properties:
        id:
          type: integer
        descricao:
          type: string
          example: "Líder avalia liderado"
        ordem:
          type: integer
        ativo:
          type: boolean

    Base:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
          example: "Base Central"

    EscalaLikert:
      type: object
      properties:
        id:
          type: integer
        nota:
          type: integer
          example: 5
        descricao:
          type: string
          example: "Excelente"
        cor:
          type: string
          example: "#4CAF50"

    PesoAvaliacao:
      type: object
      properties:
        valor:
          type: integer
          example: 3
        descricao:
          type: string
          example: "Alta relevância"
        cor:
          type: string
          example: "#FF5722"

    # --- Erros --------------------------------------------------------------
    Erro:
      type: object
      properties:
        erro:
          type: string
          example: "Credenciais inválidas"

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # ==========================================================================
  # AUTH
  # ==========================================================================
  /login:
    post:
      tags: [Auth]
      summary: Autenticar usuário
      description: |
        Autentica pelo `cpf`. Retorna um token JWT válido por 8 horas.

        Se o CPF pertencer a mais de um usuário/base e nenhuma `base` for informada,
        retorna `LoginEscolherBase` (200) com a lista de opções em vez do token - o
        frontend deve reenviar o login informando `cpf` + `base` escolhida.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: |
            Login realizado com sucesso (`LoginSucesso`) ou necessidade de escolher a base
            (`LoginEscolherBase`) quando o CPF está vinculado a mais de uma base.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: CPF (e/ou base) inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: "Credenciais inválidas"

  # ==========================================================================
  # USUÁRIOS
  # ==========================================================================
  /usuarios:
    get:
      tags: [Usuários]
      summary: Listar todos os usuários ativos
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de usuários ativos ordenados por nome
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

    post:
      tags: [Usuários]
      summary: Cadastrar novo usuário
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioRequest'
      responses:
        '201':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /me:
    get:
      tags: [Usuários]
      summary: Obter dados do usuário autenticado
      description: Retorna os dados do usuário correspondente ao token JWT enviado no header `Authorization`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do usuário autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /usuarios/base/{base}:
    get:
      tags: [Usuários]
      summary: Listar usuários por base
      security:
        - bearerAuth: []
      parameters:
        - name: base
          in: path
          required: true
          schema:
            type: string
          example: "Base Central"
      responses:
        '200':
          description: Usuários da base especificada
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioResumo'

  /usuarios/{id}:
    put:
      tags: [Usuários]
      summary: Atualizar dados de um usuário
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioRequest'
      responses:
        '200':
          description: Atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true

  /usuarios/{id}/inativar:
    put:
      tags: [Usuários]
      summary: Inativar um usuário
      description: Define `ativo = false` para o usuário. Operação não destrutiva.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Usuário inativado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  # ==========================================================================
  # AVALIAÇÕES
  # ==========================================================================
  /avaliacoes:
    get:
      tags: [Avaliações]
      summary: Listar avaliações
      security:
        - bearerAuth: []
      parameters:
        - name: base
          in: query
          required: false
          schema:
            type: string
          description: Filtra avaliações pelo nome da base do avaliado
          example: "Base Central"
      responses:
        '200':
          description: Lista de avaliações ordenadas pela data (mais recentes primeiro)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Avaliacao'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

    post:
      tags: [Avaliações]
      summary: Criar nova avaliação
      description: |
        Registra uma avaliação de desempenho.

        **Regra de negócio:** o nível de experiência do avaliado é calculado com base em
        há quantos dias sua conta foi criada (ver `/frequencia-avaliacoes`). Cada nível
        define um intervalo mínimo (dias/semanas/meses/anos) entre avaliações do mesmo
        avaliador para o mesmo avaliado, com a mesma `modalidade` e `tipoAvaliacao`. Se
        esse intervalo ainda não tiver passado, retorna `409 Conflict` informando quando
        a próxima avaliação será liberada. Níveis sem restrição configurada (todos os
        campos de intervalo zerados) não bloqueiam novas avaliações.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvaliacaoRequest'
            example:
              avaliadorId: 1
              avaliadoId: 3
              modalidade: "autoavaliacao"
              tipoAvaliacao: "Médico"
              resultado:
                criterio_01:
                  nota: 8
                  peso: 3
                criterio_02:
                  nota: 7
                  peso: 2
              observacoesGerais: "Profissional comprometido."
              pontosMelhorar: "Melhorar comunicação."
              planoAcao: "Treinamento de liderança."
      responses:
        '201':
          description: Avaliação criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvaliacaoCriada'
        '400':
          description: Campo obrigatório ausente (`modalidade` ou `tipoAvaliacao`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '404':
          description: Usuário avaliado não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '409':
          description: Avaliação bloqueada pela regra de frequência do nível do avaliado
          content:
            application/json:
              schema:
                type: object
                properties:
                  erro:
                    type: string
                    example: 'Você já avaliou este usuário como "Médico" na modalidade "autoavaliacao" recentemente. Próxima avaliação liberada em 15/07/2026 às 10:00:00.'
                  nivel:
                    type: string
                    example: "iniciante"
                  modalidade:
                    type: string
                    example: "autoavaliacao"
                  tipoAvaliacao:
                    type: string
                    example: "Médico"
                  liberaEm:
                    type: string
                    format: date-time
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /avaliacoes/info:
    get:
      tags: [Avaliações]
      summary: Consultar nível e liberação de avaliação de um usuário
      description: |
        Retorna o nível de experiência calculado para o usuário e, se `avaliadorId`,
        `modalidade` e `tipoAvaliacao` forem informados, também verifica se uma nova
        avaliação com esses parâmetros já pode ser feita (`pode_avaliar`).
      security:
        - bearerAuth: []
      parameters:
        - name: usuarioId
          in: query
          required: true
          schema:
            type: string
          example: "3"
        - name: avaliadorId
          in: query
          required: false
          schema:
            type: string
          example: "1"
        - name: modalidade
          in: query
          required: false
          schema:
            type: string
          example: "autoavaliacao"
        - name: tipoAvaliacao
          in: query
          required: false
          schema:
            type: string
          example: "Médico"
      responses:
        '200':
          description: Informações de nível e frequência do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoUsuarioAvaliacao'
        '400':
          description: Parâmetro `usuarioId` ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

