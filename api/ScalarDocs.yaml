        - bearerAuth: []
      responses:
        '200':
          description: Lista de configurações ordenadas por `dias_minimos`
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FrequenciaNivel'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

    post:
      tags: [Frequência]
      summary: Criar novo nível de frequência
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FrequenciaNivelRequest'
      responses:
        '201':
          description: Nível criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrequenciaNivel'
        '409':
          description: Nível já existe (usar PUT para atualizar)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: "Nível 'iniciante' já existe. Use PUT para atualizar."
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /frequencia-avaliacoes/{id}:
    put:
      tags: [Frequência]
      summary: Atualizar configuração de frequência
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FrequenciaNivelRequest'
      responses:
        '200':
          description: Configuração atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrequenciaNivel'
        '404':
          description: Registro não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

    delete:
      tags: [Frequência]
      summary: Remover (inativar) nível de frequência
      description: Não é uma exclusão física - apenas define `ativo = false`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Nível desativado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Nível desativado com sucesso."
                  nivel:
                    $ref: '#/components/schemas/FrequenciaNivel'
        '404':
          description: Registro não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

