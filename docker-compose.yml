services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: samu
      POSTGRES_PASSWORD: samu
      POSTGRES_DB: samu
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "samu"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
  
volumes:
  postgres-db-volume: